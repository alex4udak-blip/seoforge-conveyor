# Nixpacks build: Python + Playwright Chromium (для серверного vision-аудита 24/7)
[phases.setup]
nixPkgs = ["python3", "gcc"]
aptPkgs = [
  "wget", "ca-certificates", "fonts-liberation",
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0",
  "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1",
  "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1",
  "libasound2", "libatspi2.0-0", "libpango-1.0-0", "libcairo2"
]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && python -m playwright install chromium"
]

[phases.build]
cmds = ["echo build-ok"]

[start]
cmd = ". /opt/venv/bin/activate && python -m uvicorn app:app --host 0.0.0.0 --port $PORT"
